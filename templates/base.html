<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Choco-Tube{% endblock %}</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #fff;
            --accent-color: #ff0000;
            --header-bg: #0f0f0f;
            --card-bg: #1e1e1e;
            --hover-bg: #2a2a2a;
        }
        body {
            font-family: "Roboto", "Arial", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-top: 60px;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .logo span { color: #fff; margin-left: 2px; }
        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 20px;
        }
        .search-form {
            display: flex;
            width: 100%;
            background: #121212;
            border: 1px solid #333;
            border-radius: 40px;
            overflow: hidden;
        }
        .search-form input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 20px;
            outline: none;
            font-size: 1rem;
        }
        .search-form button {
            background: #333;
            border: none;
            color: #fff;
            padding: 0 20px;
            cursor: pointer;
        }
        .search-form button:hover { background: #444; }
        
        main {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, background 0.2s;
        }
        .video-card:hover {
            background: var(--hover-bg);
            transform: translateY(-5px);
        }
        .video-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        .video-info { padding: 12px; }
        .video-info h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #aaa;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0f0f0f;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }
        .bottom-nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bottom-nav a.active { color: var(--accent-color); }
        
        .pagination {
            display: flex;
            justify-content: center;
            padding: 40px 0 80px 0;
        }
        .next-btn {
            padding: 12px 40px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            header { padding: 0 10px; }
            .search-container { margin: 0 10px; }
            .logo span { display: none; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <a href="/" class="logo">Choco<span>Tube</span></a>
        <div class="search-container">
            <form action="/search" method="get" class="search-form">
                <input type="text" name="q" placeholder="検索" value="{{ query if query else '' }}" required>
                <button type="submit">検索</button>
            </form>
        </div>
        <div style="width: 40px;"></div> <!-- Spacer -->
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <div class="bottom-nav">
        <a href="/" class="{{ 'active' if request.path == '/' }}">🏠<span>ホーム</span></a>
        <a href="/trend" class="{{ 'active' if request.path == '/trend' }}">🔥<span>トレンド</span></a>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
