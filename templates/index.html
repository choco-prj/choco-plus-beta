{% extends "base.html" %}

{% block title %}Choco-Tube-Plus{% endblock %}

{% block content %}
<div style="text-align: center; margin-top: 80px;">
    <h1 style="font-size: 4rem; color: #c76816; margin-bottom: 20px;">Choco-Tube-Plus</h1>
    <p style="color: #aaa; margin-bottom: 40px; font-size: 1.1rem;">広告なしでYouTubeを楽しみましょう</p>
    
    <div style="max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 40px; border-radius: 24px; border: 1px solid #333;">
        <form action="/search" method="get" id="main-search-form">
            <div class="search-form" style="margin-bottom: 30px;">
                <input type="text" name="q" placeholder="動画を検索" required>
                <button type="submit">検索</button>
            </div>
            
            <div style="text-align: left; margin-bottom: 25px;">
                <p style="margin: 0 0 12px 0; font-size: 1rem; color: #fff; font-weight: 600;">検索モード:</p>
                <div style="display: flex; gap: 20px; font-size: 1rem; color: #aaa;">
                    <label style="cursor: pointer;"><input type="radio" name="mode" value="inv_first" checked> Invidious優先</label>
                    <label style="cursor: pointer;"><input type="radio" name="mode" value="yt_first"> YouTube API優先</label>
                </div>
            </div>

            <div style="text-align: left;">
                <p style="margin: 0 0 12px 0; font-size: 1rem; color: #fff; font-weight: 600;">サムネイルプロキシ:</p>
                <div style="display: flex; gap: 20px; flex-wrap: wrap; font-size: 1rem; color: #aaa;">
                    <label style="cursor: pointer;"><input type="radio" name="proxy" value="self-hosted" checked> 自サーバー</label>
                    <label style="cursor: pointer;"><input type="radio" name="proxy" value="img.youtube.com"> img.youtube.com</label>
                    <label style="cursor: pointer;"><input type="radio" name="proxy" value="i.ytimg.com"> i.ytimg.com</label>
                </div>
            </div>
        </form>
        <script>
            document.getElementById('main-search-form').addEventListener('submit', function(e) {
                const proxy = document.querySelector('input[name="proxy"]:checked').value;
                document.cookie = 'proxy_type=' + proxy + '; max-age=2592000';
            });
        </script>
    </div>
</div>
{% endblock %}
