{% extends "base.html" %}

{% block title %}{{ query }} - Choco-Tube{% endblock %}

{% block content %}
<div class="video-grid">
    {% for video in results %}
    <a href="/watch/{{ video.id }}" class="video-card">
        <img src="{{ video.thumbnail }}" alt="{{ video.title }}" loading="lazy">
        <div class="video-info">
            <h3>{{ video.title }}</h3>
            <p>{{ video.channel }}</p>
        </div>
    </a>
    {% endfor %}
</div>

{% if next_page %}
<div class="pagination">
    {% if mode == 'inv_first' %}
    <a href="/search?q={{ query }}&mode={{ mode }}&page={{ next_page }}" class="next-btn">次のページへ</a>
    {% else %}
    <a href="/search?q={{ query }}&mode={{ mode }}&token={{ next_page }}" class="next-btn">次のページへ</a>
    {% endif %}
</div>
{% endif %}
{% endblock %}
