{% extends "base.html" %}

{% block title %}視聴中 - Choco-Tube{% endblock %}

{% block content %}
<div style="max-width: 1000px; margin: 0 auto;">
    <div style="position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
        <iframe 
            src="https://www.youtube.com/embed/{{ video_id }}?autoplay=1" 
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
</div>
{% endblock %}
